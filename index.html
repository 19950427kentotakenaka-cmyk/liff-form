<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユーザー情報登録</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 20px; background-color: #06C755; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #loading { color: gray; }
    </style>
</head>
<body>

    <h2>アカウント連携</h2>
    <div id="loading">LINEログイン中...</div>

    <div id="app" style="display: none;">
        <div class="form-group">
            <label>LINE登録名＊自動で入力されますのでそのままにしておいてください</label>
            <input type="text" id="lineName" readonly>
        </div>
        <div class="form-group">
            <label>申請者名（フルネーム漢字表記＊姓と名の間に空白は入れないでください）</label>
            <input type="text" id="managementName" placeholder="例：山田太郎">
        </div>
        <button id="submitBtn">スプレッドシートに登録</button>
    </div>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxhY3MYCFo8l8369DHKWSI2XPr0aZtCADXR9KKqX3xn78rBblbkrlKG0FUgb0uzxomBfA/exec"; 
        const LIFF_ID = "2010232382-UWNA2ZWB"; 

        let userProfile = {};

        async function initLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                userProfile = await liff.getProfile();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('lineName').value = userProfile.displayName;
            } catch (error) {
                console.error("LIFF初期化エラー:", error);
                alert("プロフィールの取得に失敗しました。LINEアプリ内から開いてください。");
            }
        }

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const mName = document.getElementById('managementName').value.trim();
            if (!mName) {
                alert("管理用ユーザー名を入力してください。");
                return;
            }

            const sendData = {
                userId: userProfile.userId,
                displayName: userProfile.displayName,
                managementName: mName
            };

            try {
                document.getElementById('submitBtn').disabled = true;
                document.getElementById('submitBtn').innerText = "送信中...";

                const response = await fetch(GAS_WEB_APP_URL, {
                    method: "POST",
                    mode: "cors",
                    headers: { 
                        "Content-Type": "application/json",
                        "Accept": "application/json"
                    },
                    body: JSON.stringify(sendData)
                });

                const result = await response.json();
                if (result.status === 'success') {
                    alert("登録が完了しました！");
                    liff.closeWindow();
                } else {
                    alert("エラーが発生しました: " + result.message);
                }
            } catch (error) {
                console.error("送信エラー:", error);
                alert("通信エラーが発生しました。");
            } finally {
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').innerText = "スプレッドシートに登録";
            }
        });

        initLiff();
    </script>
</body>
</html>
